<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LockBox — Create Secure Note</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff4466' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='11' width='18' height='11' rx='2' ry='2'%3E%3C/rect%3E%3Cpath d='M7 11V7a5 5 0 0 1 10 0v4'%3E%3C/path%3E%3C/svg%3E">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div class="shell">

        <!-- Top bar -->
        <header class="topbar">
            <div class="logo">Lock<span>Box</span></div>
            <div class="tagline">Zero-knowledge encrypted note sharing</div>
        </header>

        <!-- Two-column workspace (single column on mobile) -->
        <div class="workspace">

            <!-- ── LEFT: Note / File input ── -->
            <div class="pane-left">

                <!-- Tabs -->
                <div class="tab-row">
                    <button class="tab-btn active" onclick="switchTab('note', this)">Text Note</button>
                    <button class="tab-btn" onclick="switchTab('file', this)">File Attachment</button>
                </div>

                <!-- Note tab -->
                <div id="tab-note" class="tab-panel active">
                    <div class="note-field">
                        <div class="field-label">Secret note</div>
                        <textarea id="noteText"
                            placeholder="Type your confidential message here.&#10;&#10;It will be AES-256 encrypted entirely in your browser before reaching the server. The server never sees the plaintext."></textarea>
                    </div>
                </div>

                <!-- File tab -->
                <div id="tab-file" class="tab-panel">
                    <div class="note-field">
                        <div class="field-label">File to encrypt</div>
                        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
                            ondragover="onDragOver(event)" ondragleave="onDragLeave()" ondrop="onDrop(event)">
                            <div class="drop-zone-text">
                                <strong>Tap to browse</strong> or drag a file here<br />
                                PDF, images, text — max 5 MB
                            </div>
                        </div>
                        <input type="file" id="fileInput" style="display:none"
                            onchange="onFileSelected(this.files[0])" />
                        <div class="file-chip" id="fileChip">
                            <span class="chip-name" id="chipName"></span>
                            <span class="chip-size" id="chipSize"></span>
                            <button class="btn-clear" onclick="clearFile()">x</button>
                        </div>
                    </div>
                </div>

            </div>

            <!-- ── RIGHT: Options + Generate + Result ── -->
            <div class="pane-right">

                <div id="optionsPanel" style="display:flex; flex-direction:column; gap:0.3rem;">


                    <!-- Secret key -->
                    <div class="section">
                        <div class="section-head">Secret Key</div>
                        <div class="section-body">
                            <div class="key-row">
                                <input type="text" id="secretKey" placeholder="Generate Secret Key"
                                    autocomplete="off" />
                                <!-- oninput="evaluateStrength(this.value)" /> -->
                                <button class="btn-gen" onclick="generatePassphrase()">Generate</button>
                            </div>
                            <div class="passphrase-reveal" id="passphraseReveal">
                                <span id="passphraseText"></span>
                            </div>
                            <div class="passphrase-hint" id="passphraseHint">
                                <!-- Embedded in the link. Anyone with the full link can decrypt. -->
                            </div>
                            
                        </div>
                    </div>

                    <!-- Burn on read -->
                    <div class="section">
                        <div class="section-head">Burn on Read</div>
                        <div class="section-body">
                            <div class="toggle-row">
                                <label class="toggle">
                                    <input type="checkbox" id="isOneTime" checked />
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label">Delete from server after first view</span>
                            </div>
                        </div>
                    </div>

                    <!-- Auto-wipe timer -->
                    <div class="section">
                        <div class="section-head">Auto-wipe Timer</div>
                        <div class="section-body">
                            <div class="timer-grid">
                                <div class="timer-opt selected" onclick="selectTimer(null, this)">No timer</div>
                                <div class="timer-opt" onclick="selectTimer(30, this)">30 sec</div>
                                <div class="timer-opt" onclick="selectTimer(60, this)">1 min</div>
                                <div class="timer-opt" onclick="selectTimer(86400, this)">24 hrs</div>
                            </div>
                        </div>
                    </div>

                </div>


                <!-- Error -->
                <div class="error-box" id="errorBox"></div>

                <!-- Generate button -->
                <button class="btn-primary" id="generateBtn" onclick="generateLink()">
                    Generate Secure Link
                </button>

                <!-- Result -->
                <div class="result-box" id="resultBox">
                    <div class="result-head">Secure link — share this</div>
                    <div class="result-body">
                        <div class="result-link" id="resultLink"></div>
                        <button class="btn-copy" onclick="copyLink()">Copy to clipboard</button>
                        <div class="result-meta" id="resultMeta"></div>
                        <button class="btn-reset" onclick="resetForm()">Create another note</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

<script src="script.js"></script>
</body>

</html>
